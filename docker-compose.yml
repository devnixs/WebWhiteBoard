services:
  postgres:
    image: postgres:17
    container_name: webwhiteboard-postgres
    environment:
      POSTGRES_DB: webwhiteboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webwhiteboard"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
