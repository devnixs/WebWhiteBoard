services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # These env vars follow ASP.NET Core's double-underscore config mapping, like ConnectionStrings__Postgres.
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=webwhiteboard;Username=postgres;Password=postgres
      - Assets__UploadFolderPath=/app/assets
      - Assets__PublicUrlPrefix=/assets
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - board-assets:/app/assets
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:17
    container_name: webwhiteboard-postgres
    environment:
      POSTGRES_DB: webwhiteboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webwhiteboard"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  board-assets:
